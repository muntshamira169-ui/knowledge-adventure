<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎮 知识大冒险</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:"PingFang SC","Microsoft YaHei",sans-serif;background:#0a0a1a;color:#e2e8f0;min-height:100vh;display:flex;align-items:center;justify-content:center}
.card{background:#1a1a2e;border-radius:20px;padding:40px;max-width:500px;width:90%;text-align:center;box-shadow:0 8px 40px rgba(99,102,241,0.15)}
h1{font-size:2.5rem;background:linear-gradient(135deg,#818cf8,#c084fc,#f472b6);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:8px}
.sub{color:#94a3b8;margin-bottom:30px}
.group{margin-bottom:18px;text-align:left}
.group label{display:block;font-size:0.9rem;color:#94a3b8;margin-bottom:6px}
.group input,.group select{width:100%;padding:12px;border-radius:12px;border:2px solid #2d2d4a;background:#0f0f23;color:#e2e8f0;font-size:1rem;outline:none}
.group input:focus,.group select:focus{border-color:#818cf8}
.subj-row{display:flex;gap:6px;flex-wrap:wrap}
.subj-btn{flex:1;min-width:60px;padding:10px 8px;border-radius:10px;border:2px solid #2d2d4a;background:#0f0f23;color:#94a3b8;cursor:pointer;font-size:0.85rem;transition:all .2s}
.subj-btn:hover{border-color:#818cf8;color:#e2e8f0}
.subj-btn.active{border-color:#818cf8;background:rgba(99,102,241,0.15);color:#818cf8}
.start-btn{width:100%;padding:16px;border-radius:14px;border:none;background:linear-gradient(135deg,#6366f1,#8b5cf6);color:white;font-size:1.2rem;font-weight:700;cursor:pointer;margin-top:10px;transition:all .15s}
.start-btn:hover{transform:translateY(-2px);box-shadow:0 4px 20px rgba(99,102,241,0.4)}

/* Map styles */
.hud{display:flex;align-items:center;justify-content:space-between;padding:10px 20px;background:rgba(26,26,46,0.95);border-bottom:1px solid #2d2d4a;flex-wrap:wrap;gap:8px}
.hud-grade{padding:3px 10px;border-radius:20px;background:rgba(129,140,248,0.15);color:#818cf8;font-size:0.8rem;font-weight:600}
.xp-bar-wrap{position:relative;width:180px;height:18px;background:#2d2d4a;border-radius:9px;overflow:hidden}
.xp-bar-fill{height:100%;background:linear-gradient(90deg,#6ee7b7,#34d399);border-radius:9px;transition:width .5s;width:0%}
.xp-bar-text{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:0.65rem;color:white;text-shadow:0 1px 3px rgba(0,0,0,0.5)}
.map-header{padding:20px;text-align:center}
.map-stats{display:flex;gap:20px;justify-content:center;color:#94a3b8;font-size:0.9rem;flex-wrap:wrap}
.map-stats b{color:#e2e8f0}
.sync-btn{padding:6px 14px;border-radius:8px;border:1px solid #818cf8;background:rgba(99,102,241,0.15);color:#818cf8;cursor:pointer;font-size:0.85rem}
.map-subjects{display:flex;gap:6px;padding:0 20px 12px;justify-content:center;flex-wrap:wrap}
.msb{padding:8px 14px;border-radius:10px;border:2px solid #2d2d4a;background:#16213e;color:#94a3b8;cursor:pointer;font-size:0.85rem}
.msb.active{border-color:#818cf8;background:rgba(99,102,241,0.15);color:#818cf8}
.world-map{padding:0 20px 40px;max-width:900px;margin:0 auto}
.stage-card{background:#1a1a2e;border-radius:16px;padding:16px;margin-bottom:16px;border:1px solid #2d2d4a}
.stage-card.stage-current{border-color:#818cf8;box-shadow:0 0 20px rgba(99,102,241,0.2)}
.stage-card.stage-locked{opacity:0.5;pointer-events:none;filter:grayscale(0.3)}
.stage-title{font-size:1rem;font-weight:700;margin-bottom:12px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.stage-badge{font-size:0.7rem;padding:2px 10px;border-radius:20px;font-weight:600}
.stage-badge.current{background:rgba(99,102,241,0.2);color:#818cf8}
.stage-badge.past{background:rgba(74,222,128,0.15);color:#4ade80}
.stage-badge.future{background:rgba(148,163,184,0.15);color:#94a3b8}
.stage-progress{margin-left:auto;font-size:0.8rem;background:rgba(99,102,241,0.2);color:#818cf8;padding:3px 10px;border-radius:20px}
.unit-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px}
.unit-card{background:#16213e;border-radius:12px;padding:14px;border:1px solid #2d2d4a;cursor:pointer;transition:all .2s;position:relative;overflow:hidden}
.unit-card:hover{border-color:#818cf8;transform:translateY(-2px);box-shadow:0 4px 16px rgba(99,102,241,0.2)}
.unit-card.completed{border-color:#4ade80}
.unit-card.completed::after{content:'✅';position:absolute;top:8px;right:8px}
.unit-card.no-questions{opacity:0.6;cursor:default}
.unit-card.no-questions:hover{transform:none;border-color:#2d2d4a;box-shadow:none}
.unit-name{font-weight:600;font-size:0.9rem;margin-bottom:6px}
.unit-meta{font-size:0.75rem;color:#94a3b8;display:flex;justify-content:space-between}
.unit-boss{font-size:0.75rem;color:#fbbf24;margin-top:4px}

/* Battle */
.battle-scene{display:flex;align-items:center;justify-content:center;padding:20px;gap:30px;min-height:160px}
.enemy-sprite{font-size:4rem}
.player-sprite{font-size:3rem}
.enemy-name{font-weight:700;margin:6px 0}
.enemy-hp-bar{width:140px;height:10px;background:#2d2d4a;border-radius:5px;overflow:hidden;margin:4px auto}
.enemy-hp-fill{height:100%;background:linear-gradient(90deg,#ff6b6b,#ff4757);border-radius:5px;transition:width .5s;width:100%}
.enemy-hp-text{font-size:0.7rem;color:#94a3b8}
.question-panel{margin:0 20px;background:#1a1a2e;border-radius:16px;padding:20px;border:1px solid #2d2d4a}
.question-text{font-size:1.1rem;font-weight:600;margin-bottom:16px;line-height:1.6}
.options-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.opt-btn{padding:14px;border-radius:12px;border:2px solid #2d2d4a;background:#16213e;color:#e2e8f0;cursor:pointer;font-size:0.95rem;text-align:left;transition:all .15s}
.opt-btn:hover{border-color:#818cf8;background:rgba(99,102,241,0.1)}
.opt-btn:active{transform:scale(0.97)}
.opt-btn.correct{border-color:#4ade80!important;background:rgba(74,222,128,0.15)!important}
.opt-btn.wrong{border-color:#ff6b6b!important;background:rgba(255,107,107,0.15)!important;animation:shake .4s}
.opt-btn.hidden-opt{opacity:0.12;pointer-events:none}
.opt-btn.disabled{pointer-events:none;opacity:0.6}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-8px)}75%{transform:translateX(8px)}}
.power-bar{display:flex;gap:8px;padding:12px 20px;justify-content:center}
.pw-btn{padding:8px 14px;border-radius:10px;border:1px solid #2d2d4a;background:#16213e;color:#94a3b8;cursor:pointer;font-size:0.8rem}
.pw-btn:hover:not(:disabled){border-color:#818cf8;color:#818cf8}
.pw-btn:disabled{opacity:0.4;cursor:not-allowed}
.combo-text{font-size:1.2rem;font-weight:900;color:#fbbf24;opacity:0;transition:opacity .2s}
.combo-text.show{opacity:1;animation:comboPop .5s}
@keyframes comboPop{0%{transform:scale(0.5);opacity:0}50%{transform:scale(1.3)}100%{transform:scale(1);opacity:1}}
.flee-btn{display:block;margin:10px auto 20px;padding:8px 20px;border-radius:10px;border:1px solid #2d2d4a;background:transparent;color:#94a3b8;cursor:pointer}
.modal-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.7);z-index:100;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(4px)}
.modal-card{background:#1a1a2e;border-radius:20px;padding:32px;max-width:400px;width:90%;text-align:center;border:1px solid #2d2d4a;animation:modalPop .4s}
@keyframes modalPop{0%{transform:scale(0.8);opacity:0}100%{transform:scale(1);opacity:1}}
.result-icon{font-size:4rem;margin-bottom:12px}
.result-btn{width:100%;padding:14px;border-radius:12px;border:none;background:linear-gradient(135deg,#6366f1,#8b5cf6);color:white;font-size:1rem;font-weight:600;cursor:pointer;margin-top:12px}
.result-btn.secondary{background:transparent;border:1px solid #2d2d4a;color:#94a3b8;margin-top:8px}
.achievement-toast{position:fixed;top:80px;right:20px;z-index:200;background:#1a1a2e;border-radius:14px;padding:16px 20px;border:2px solid #fbbf24;display:flex;align-items:center;gap:12px;animation:slideIn .5s,slideOut .5s 3s forwards;box-shadow:0 4px 20px rgba(251,191,36,0.3)}
@keyframes slideIn{from{transform:translateX(120%);opacity:0}to{transform:translateX(0);opacity:1}}
@keyframes slideOut{from{transform:translateX(0);opacity:1}to{transform:translateX(120%);opacity:0}}
.back-btn{display:block;margin:16px auto 0;padding:10px 24px;border-radius:10px;border:1px solid #2d2d4a;background:transparent;color:#94a3b8;cursor:pointer;font-size:0.9rem}
.screen{display:none}
.screen.active{display:block;width:100%;max-width:960px;margin:0 auto}
.streak-badge{color:#fbbf24;font-weight:700;animation:pulse .5s ease infinite alternate}
@keyframes pulse{from{opacity:0.7}to{opacity:1}}
.battle-info{display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.battle-hud{padding:10px 20px;display:flex;align-items:center;justify-content:space-between;background:rgba(26,26,46,0.95);border-bottom:1px solid #2d2d4a;flex-wrap:wrap;gap:8px}
.battle-timer{color:#94a3b8}
@media(max-width:600px){.options-grid{grid-template-columns:1fr}.unit-grid{grid-template-columns:1fr}.battle-scene{flex-direction:column;gap:16px}}
</style>
</head>
<body>

<!-- 开始 -->
<div id="s-start" class="screen active">
  <div class="card">
    <h1>知识大冒险</h1>
    <p class="sub">⚔️ 打怪升级学知识</p>
    <div class="group"><label>🎓 姓名</label><input id="inName" value="张三"></div>
    <div class="group"><label>📐 年级</label><select id="inGrade"><option value="1">一年级</option><option value="2">二年级</option><option value="3">三年级</option><option value="4">四年级</option><option value="5">五年级</option><option value="6" selected>六年级</option><option value="7">七年级</option><option value="8">八年级</option><option value="9">九年级</option></select></div>
    <div class="group"><label>🗺️ 学科</label><div class="subj-row" id="subjPick"></div></div>
    <button class="start-btn" onclick="doStart()">⚔️ 开始冒险！</button>
  </div>
</div>

<!-- 地图 -->
<div id="s-map" class="screen">
  <div class="hud">
    <span id="hPlayer">🎓 --</span>
    <span class="hud-grade" id="hGrade">--</span>
    <span>⭐ Lv.<span id="hLevel">1</span></span>
    <div class="xp-bar-wrap"><div class="xp-bar-fill" id="hXpBar"></div><span class="xp-bar-text" id="hXpText">0/100</span></div>
    <span>🪙 <span id="hGold">0</span></span>
    <span class="streak-badge" id="hStreak" style="display:none">🔥 x0</span>
  </div>
  <div class="map-header">
    <h2 id="mapTitle">🗺️ 数学王国</h2>
    <div class="map-stats"><span>🏰 <b id="mapM">0</b>/<b id="mapT">0</b></span><span>📊 <b id="mapP">0%</b></span><button class="sync-btn" onclick="doExport()">🔄 同步图谱</button></div>
  </div>
  <div class="map-subjects" id="mapTabs"></div>
  <div class="world-map" id="mapContent"></div>
  <button class="back-btn" onclick="showScreen('start')">← 返回</button>
</div>

<!-- 战斗 -->
<div id="s-battle" class="screen">
  <div class="battle-hud">
    <div class="battle-info"><span id="btName">🎓 --</span><span class="streak-badge" id="btStr" style="display:none">🔥 x0</span><span class="battle-timer" id="btTime">⏱ 20s</span></div>
  </div>
  <div class="battle-scene">
    <div style="text-align:center"><div id="enSprite" style="font-size:4rem">👾</div><div id="enName" style="font-weight:700;margin:6px 0">--</div><div class="enemy-hp-bar"><div class="enemy-hp-fill" id="enHpBar"></div></div><div class="enemy-hp-text" id="enHpText">HP: 3/3</div></div>
    <div style="text-align:center"><div style="font-size:3rem">🧑‍🎓</div><div class="combo-text" id="comboText"></div></div>
  </div>
  <div class="question-panel">
    <div style="display:flex;gap:10px;margin-bottom:12px"><span style="font-size:0.75rem;background:rgba(99,102,241,0.2);color:#818cf8;padding:3px 10px;border-radius:20px" id="qTag">选择题</span><span style="font-size:0.85rem" id="qDiff">⭐</span><span style="margin-left:auto;font-size:0.8rem;color:#94a3b8" id="qNum">1/5</span></div>
    <div class="question-text" id="qText">--</div>
    <div class="options-grid" id="qOpts"></div>
  </div>
  <div class="power-bar">
    <button class="pw-btn" id="pwHint" onclick="usePower('hint')">💡 提示 <span>3</span></button>
    <button class="pw-btn" id="pwSkip" onclick="usePower('skip')">⏭️ 跳过 <span>2</span></button>
    <button class="pw-btn" id="pwFifty" onclick="usePower('fifty')">🎯 50/50 <span>1</span></button>
  </div>
  <button class="flee-btn" onclick="doFlee()">🏃 逃跑</button>
</div>

<!-- 结果 -->
<div id="s-result" class="modal-overlay" style="display:none">
  <div class="modal-card">
    <div class="result-icon" id="rIcon">🎉</div>
    <h2 id="rTitle">战斗胜利！</h2><p id="rMsg"></p>
    <div id="rRewards" style="margin:12px 0;font-size:0.9rem"></div>
    <button class="result-btn" onclick="doContinue()">继续冒险 →</button>
    <button class="result-btn secondary" onclick="showScreen('map')">返回地图</button>
  </div>
</div>

<!-- 成就 -->
<div id="s-ach" class="achievement-toast" style="display:none"><span id="achIcon" style="font-size:2rem">🏆</span><div><div id="achTitle" style="font-weight:700;color:#fbbf24">成就解锁！</div><div id="achDesc" style="font-size:0.85rem;color:#94a3b8"></div></div></div>

<script>
// ===== 游戏数据 =====

let P = { name:'', grade_num:6, grade:'六年级', level:1, xp:0, xpToNext:100, gold:0, streak:0, maxStreak:0, correct:0, total:0, powers:{hint:3,skip:2,fifty:1}, badges:[] };
let curSubj = 'math';
let battle = null;

// ===== 初始化 =====
const SUBJS = [
  {key:'math',name:'数学',icon:'🔢'},
  {key:'chinese',name:'语文',icon:'📖'},
  {key:'english',name:'英语',icon:'🌍'},
  {key:'physics',name:'物理',icon:'⚡'},
  {key:'chemistry',name:'化学',icon:'🧪'},
];
SUBJS.forEach(s => {
  const btn = document.createElement('button');
  btn.className = 'subj-btn' + (s.key === 'math' ? ' active' : '');
  btn.textContent = s.icon + ' ' + s.name;
  btn.onclick = () => { document.querySelectorAll('.subj-btn').forEach(b=>b.classList.remove('active')); btn.classList.add('active'); };
  document.getElementById('subjPick').appendChild(btn);
});

function showScreen(name) {
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  const el = document.getElementById('s-' + name);
  if (el) { el.classList.add('active'); console.log('📺 showScreen:', name); }
  else { console.error('❌ Screen not found: s-' + name); }
  if (name === 'map') {
    try { renderMap(); }
    catch(e) { console.error('renderMap error:', e); document.getElementById('mapContent').innerHTML = '<p style="text-align:center;padding:40px;color:#f87171">⚠️ 地图加载失败: '+e.message+'</p>'; }
  }
}

// ===== 开始 =====
function doStart() {
  P.name = document.getElementById('inName').value.trim() || '冒险者';
  P.grade_num = parseInt(document.getElementById('inGrade').value) || 6;
  const cnGrades = ['','一年级','二年级','三年级','四年级','五年级','六年级','七年级','八年级','九年级'];
  P.grade = cnGrades[P.grade_num] || (P.grade_num+'年级');
  const activeBtn = document.querySelector('.subj-btn.active');
  const btnText = activeBtn ? activeBtn.textContent : '数学';
  curSubj = btnText.includes('数学') ? 'math' :
            btnText.includes('语文') ? 'chinese' :
            btnText.includes('英语') ? 'english' :
            btnText.includes('物理') ? 'physics' : 'chemistry';
  console.log('🚀 doStart:', P.name, '年级'+P.grade_num, curSubj);
  updateHUD();
  showScreen('map');
}

// ===== HUD =====
function updateHUD() {
  document.getElementById('hPlayer').textContent = '🎓 ' + P.name;
  document.getElementById('hGrade').textContent = '📐 ' + P.grade;
  document.getElementById('hLevel').textContent = P.level;
  document.getElementById('hGold').textContent = P.gold;
  document.getElementById('hXpBar').style.width = Math.min(100,(P.xp/P.xpToNext)*100) + '%';
  document.getElementById('hXpText').textContent = P.xp + '/' + P.xpToNext + ' XP';
  const s = document.getElementById('hStreak');
  if (P.streak >= 2) { s.style.display = 'inline'; s.textContent = '🔥 x' + P.streak; }
  else { s.style.display = 'none'; }
  // 道具按钮
  ['pwHint','pwSkip','pwFifty'].forEach(id => {
    const key = id === 'pwHint' ? 'hint' : id === 'pwSkip' ? 'skip' : 'fifty';
    const btn = document.getElementById(id);
    if (btn) { btn.disabled = P.powers[key] <= 0; btn.querySelector('span').textContent = P.powers[key]; }
  });
}

  document.getElementById('mapT').textContent = subjData.total_points;
  document.getElementById('mapP').textContent = Math.round((subjData.mastered_points/subjData.total_points)*100) + '%';
  
  // 学科标签
  document.getElementById('mapTabs').innerHTML = SUBJS.map(s => 
    `<button class="msb ${s.key===curSubj?'active':''}" onclick="curSubj='${s.key}';renderMap()">${s.icon} ${s.name}</button>`
  ).join('');
  
  let html = '';
  for (const stage of (subjData.stages || [])) {
    const gr = stage.grade_range || '';
    let sMin=99,sMax=0;
    if (gr.includes('-')) { const p=gr.split('-'); sMin=parseInt(p[0]); sMax=parseInt(p[1]); }
    else { sMin=sMax=parseInt(gr)||0; }
    
    const isCur = P.grade_num >= sMin && P.grade_num <= sMax;
    const isPast = P.grade_num > sMax;
    const isFut = P.grade_num < sMin;
    
    let cls = 'stage-card';
    let badge = '';
    if (isCur) { cls += ' stage-current'; badge = '<span class="stage-badge current">📍 当前学段</span>'; }
    else if (isPast) { badge = '<span class="stage-badge past">✅ 已通过</span>'; }
    else if (isFut) { cls += ' stage-locked'; badge = '<span class="stage-badge future">🔒 ' + sMin + '年级起</span>'; }
    
    html += `<div class="${cls}"><div class="stage-title">🏰 ${stage.name} ${badge}<span class="stage-progress">${stage.progress}%</span></div>`;
    
    if (!isFut) {
      html += '<div class="unit-grid">';
      for (const mod of (stage.modules||[])) {
        for (const unit of (mod.units||[])) {
          const pts = unit.points || [];
          const hasQ = pts.some(p=>(p.questions||[]).length>0);
          const mastered = pts.filter(p=>p.status==='mastered').length;
          const done = mastered === pts.length && pts.length > 0;
          html += `<div class="unit-card ${done?'completed':''} ${!hasQ?'no-questions':''}" ${hasQ ? `onclick="startBattle('${escapeJs(unit.name)}')"` : ''} title="${hasQ?'点击挑战':'暂无题目'}">
            <div class="unit-name">📜 ${unit.name}</div>
            <div class="unit-meta"><span>⭐ ${mastered}/${pts.length}</span><span>${done?'已通关':hasQ?'⚔️ 挑战':'📝'}</span></div>
            ${hasQ?'<div class="unit-boss">🐉 '+ (unit.boss_name||unit.name+'守护者') +'</div>':''}
          </div>`;
        }
      }
      html += '</div>';
    } else {
      html += '<div style="text-align:center;padding:20px;color:#94a3b8">🔒 升到 ' + sMin + ' 年级解锁</div>';
    }
    html += '</div>';
  }
  document.getElementById('mapContent').innerHTML = html || '<p style="text-align:center;padding:40px;color:#94a3b8">地图生成中...</p>';
}

function escapeJs(s) { return s.replace(/\\/g,'\\\\').replace(/'/g,"\\'").replace(/"/g,'\\"'); }

// ===== 战斗 =====
function startBattle(unitName) {
  const subjData = ALL_DATA.subjects[curSubj];
  let allPts = [];
  for (const stage of (subjData.stages||[])) {
    for (const mod of (stage.modules||[])) {
      for (const unit of (mod.units||[])) {
        if (unit.name === unitName) allPts = unit.points || [];
      }
    }
  }
  if (allPts.length === 0) { alert('该关卡无题目'); return; }
  
  battle = { unitName, points:allPts, ptIdx:0, qIdx:0, enemyMaxHP:allPts.reduce((s,p)=>s+(p.difficulty||1),0), enemyHP:allPts.reduce((s,p)=>s+(p.difficulty||1),0), timer:null, timeLeft:0, answered:false };
  
  showScreen('battle');
  document.getElementById('btName').textContent = '🎓 ' + P.name;
  nextQuestion();
}

function nextQuestion() {
  while (battle.ptIdx < battle.points.length) {
    const pt = battle.points[battle.ptIdx];
    if (pt.questions && pt.questions.length > battle.qIdx) break;
    battle.ptIdx++; battle.qIdx = 0;
  }
  if (battle.ptIdx >= battle.points.length) { endBattle(true); return; }
  
  const pt = battle.points[battle.ptIdx];
  const q = pt.questions[battle.qIdx];
  
  document.getElementById('enSprite').textContent = ['👾','👻','🦇','🐲','👹'][Math.min((pt.difficulty||1)-1,4)]||'👾';
  document.getElementById('enName').textContent = pt.enemy_name || pt.name;
  document.getElementById('qTag').textContent = q.type==='choice'?'选择题':'问答题';
  document.getElementById('qDiff').textContent = '⭐'.repeat(pt.difficulty||1);
  document.getElementById('qNum').textContent = (battle.ptIdx+1)+'/'+battle.points.length;
  document.getElementById('qText').textContent = q.question;
  
  const optDiv = document.getElementById('qOpts');
  if (q.type==='choice' && q.options.length>0) {
    optDiv.innerHTML = q.options.map((o,i) => 
      `<button class="opt-btn" onclick="doAnswer('${escapeJs(String(o))}',this)">${String.fromCharCode(65+i)}. ${o}</button>`
    ).join('');
  } else {
    optDiv.innerHTML = `<input id="txtAns" style="grid-column:1/-1;padding:14px;border-radius:12px;border:2px solid #2d2d4a;background:#0f0f23;color:#e2e8f0;font-size:1rem;outline:none" placeholder="输入答案..." onkeydown="if(event.key==='Enter')doAnswer(document.getElementById('txtAns').value)"><button class="opt-btn" onclick="doAnswer(document.getElementById('txtAns').value)" style="grid-column:1/-1">✅ 提交</button>`;
  }
  
  battle.answered = false;
  battle.timeLeft = q.time_limit || 20;
  document.getElementById('btTime').textContent = '⏱ ' + battle.timeLeft + 's';
  document.getElementById('btTime').style.color = '#94a3b8';
  clearInterval(battle.timer);
  battle.timer = setInterval(() => {
    battle.timeLeft--;
    document.getElementById('btTime').textContent = '⏱ ' + battle.timeLeft + 's';
    if (battle.timeLeft <= 5) document.getElementById('btTime').style.color = '#ff6b6b';
    if (battle.timeLeft <= 0) { clearInterval(battle.timer); if (!battle.answered) doAnswer(null); }
  }, 1000);
  
  updateBattleDisplay();
}

function updateBattleDisplay() {
  const pct = Math.max(0, (battle.enemyHP/battle.enemyMaxHP)*100);
  document.getElementById('enHpBar').style.width = pct + '%';
  document.getElementById('enHpText').textContent = 'HP: ' + Math.max(0,battle.enemyHP) + '/' + battle.enemyMaxHP;
  document.getElementById('btStr').style.display = P.streak >= 2 ? 'inline' : 'none';
  if (P.streak >= 2) document.getElementById('btStr').textContent = '🔥 x' + P.streak;
}

function doAnswer(answer, btnEl) {
  if (battle.answered) return;
  battle.answered = true;
  clearInterval(battle.timer);
  
  const pt = battle.points[battle.ptIdx];
  const q = pt.questions[battle.qIdx];
  const correct = answer !== null && answer !== '' && String(answer).trim().toLowerCase() === String(q.answer).trim().toLowerCase();
  const speed = (q.time_limit||20) - battle.timeLeft;
  
  P.total++;
  
  if (correct) {
    P.streak++;
    if (P.streak > P.maxStreak) P.maxStreak = P.streak;
    P.correct++;
    const xpGain = (pt.difficulty||1)*10 + Math.min(P.streak-1,5)*5 + (battle.timeLeft>10?5:0);
    P.xp += xpGain;
    P.gold += (pt.difficulty||1)*3 + Math.min(P.streak-1,5)*2;
    battle.enemyHP -= (pt.difficulty||1);
    
    // highlight correct
    document.querySelectorAll('.opt-btn').forEach(b => { b.classList.add('disabled'); if (b.textContent.includes(q.answer)) b.classList.add('correct'); });
    
    // combo
    if (P.streak >= 3) {
      const el = document.getElementById('comboText');
      el.textContent = P.streak >= 5 ? '🔥 ' + P.streak + '连击！超神！' : '🔥 ' + P.streak + '连击！';
      el.classList.add('show');
      setTimeout(() => el.classList.remove('show'), 1500);
    }
    
    // level up
    while (P.xp >= P.xpToNext) { P.xp -= P.xpToNext; P.level++; P.xpToNext = Math.floor(P.xpToNext*1.5); }
    
    // achievements
    checkAch(speed);
  } else {
    P.streak = 0;
    P.xp += 2;
    document.querySelectorAll('.opt-btn').forEach(b => { b.classList.add('disabled'); if (answer && b.textContent.includes(answer)) b.classList.add('wrong'); if (b.textContent.includes(q.answer)) b.classList.add('correct'); });
    if (btnEl) btnEl.classList.add('wrong');
  }
  
  updateHUD();
  updateBattleDisplay();
  
  setTimeout(() => {
    battle.qIdx++;
    if (battle.qIdx >= pt.questions.length) { battle.ptIdx++; battle.qIdx = 0; }
    if (battle.enemyHP <= 0) endBattle(true);
    else if (battle.ptIdx >= battle.points.length) endBattle(true);
    else nextQuestion();
  }, 800);
}

function checkAch(speed) {
  const showAch = (icon,title,desc) => {
    document.getElementById('achIcon').textContent = icon;
    document.getElementById('achTitle').textContent = '🏆 ' + title + ' 解锁！';
    document.getElementById('achDesc').textContent = desc;
    const el = document.getElementById('s-ach');
    el.style.display = 'flex'; el.style.animation = 'none'; el.offsetHeight;
    el.style.animation = 'slideIn .5s,slideOut .5s 3s forwards';
    setTimeout(()=>el.style.display='none',3500);
  };
  if (P.correct === 1 && !P.badges.includes('first')) { P.badges.push('first'); showAch('⚔️','初战告捷','答对第一道题'); }
  if (P.streak === 3 && !P.badges.includes('s3')) { P.badges.push('s3'); showAch('🔥','三连胜','连续答对3题'); }
  if (P.streak === 5 && !P.badges.includes('s5')) { P.badges.push('s5'); showAch('⚡','五杀超神','连续答对5题'); }
  if (P.streak === 10 && !P.badges.includes('s10')) { P.badges.push('s10'); showAch('👑','十连绝世','连续答对10题'); }
  if (speed <= 3 && P.streak >= 1 && !P.badges.includes('fast')) { P.badges.push('fast'); showAch('💨','闪电侠','3秒内答对'); }
}

// ===== 道具 =====
function usePower(type) {
  if (!battle || P.powers[type] <= 0) return;
  P.powers[type]--;
  if (type === 'hint') alert('💡 提示：仔细看题目关键词！');
  if (type === 'skip') { clearInterval(battle.timer); battle.answered = true; battle.qIdx++; if (battle.qIdx >= (battle.points[battle.ptIdx]?.questions?.length||0)) { battle.ptIdx++; battle.qIdx=0; } if (battle.ptIdx >= battle.points.length) endBattle(true); else setTimeout(nextQuestion,300); }
  if (type === 'fifty') {
    const q = battle.points[battle.ptIdx]?.questions[battle.qIdx];
    if (q?.options) {
      const wrong = q.options.filter(o => String(o).trim().toLowerCase() !== String(q.answer).trim().toLowerCase());
      const hide = wrong.sort(()=>Math.random()-0.5).slice(0,Math.min(2,wrong.length));
      document.querySelectorAll('.opt-btn').forEach(b => { if (hide.some(o=>b.textContent.includes(o))) b.classList.add('hidden-opt'); });
    }
  }
  updateHUD();
}

function doFlee() { clearInterval(battle?.timer); battle=null; P.streak=0; showScreen('map'); updateHUD(); }

function endBattle(won) {
  clearInterval(battle?.timer);
  const r = document.getElementById('s-result');
  r.style.display = 'flex';
  document.getElementById('rIcon').textContent = won ? '🎉' : '💪';
  document.getElementById('rTitle').textContent = won ? '战斗胜利！' : '继续加油！';
  document.getElementById('rMsg').textContent = won ? '击败了 ' + (battle?.unitName||'') + ' 的守护者！' : '再来一次吧！';
  document.getElementById('rRewards').innerHTML = '⭐ Lv.'+P.level+' | 🪙 '+P.gold+' | 🔥 最大连击:'+P.maxStreak+' | ✅ 正确率:'+Math.round((P.correct/Math.max(1,P.total))*100)+'%';
  updateHUD();
  if (won && !P.badges.includes('boss')) { P.badges.push('boss'); showAch2('🐉','屠龙勇士','击败第一个Boss'); }
}

function showAch2(icon,title,desc) {
  document.getElementById('achIcon').textContent = icon;
  document.getElementById('achTitle').textContent = '🏆 ' + title + ' 解锁！';
  document.getElementById('achDesc').textContent = desc;
  const el = document.getElementById('s-ach');
  el.style.display = 'flex'; el.style.animation = 'none'; el.offsetHeight;
  el.style.animation = 'slideIn .5s,slideOut .5s 3s forwards';
  setTimeout(()=>el.style.display='none',3500);
}

function doContinue() { document.getElementById('s-result').style.display = 'none'; showScreen('map'); }

function doExport() {
  const json = JSON.stringify({player:P,subjects:ALL_DATA.subjects,achievements:ALL_DATA.achievements},null,2);
  const blob = new Blob([json],{type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a'); a.href = url; a.download = 'game_'+P.name+'.json'; a.click();
  URL.revokeObjectURL(url);
  alert('📥 数据已导出！\n请在终端运行：\npython3 scripts/sync_game_results.py sync '+P.name);
}

// 启动
document.addEventListener('DOMContentLoaded', () => console.log('🎮 知识大冒险就绪'));
</script>
