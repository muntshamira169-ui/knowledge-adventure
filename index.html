<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎮 知识大冒险 v2</title>
<style>
:root{--bg:#0f0f23;--card:rgba(26,26,46,0.95);--border:#2d2d4a;--text:#e2e8f0;--dim:#94a3b8;--accent:#818cf8;--gold:#fbbf24;--green:#10b981;--red:#ef4444}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'PingFang SC','Microsoft YaHei',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
body::before{content:'';position:fixed;top:0;left:0;width:100%;height:100%;background:radial-gradient(ellipse at 50% 0%,rgba(99,102,241,0.15) 0%,transparent 60%),radial-gradient(ellipse at 80% 80%,rgba(16,185,129,0.08) 0%,transparent 50%);pointer-events:none;z-index:0}
.screen{display:none;position:relative;z-index:1;max-width:960px;margin:0 auto;padding:20px}
.screen.active{display:block}
.card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:32px 24px;max-width:480px;margin:40px auto}
h1{font-size:2rem;text-align:center;margin-bottom:8px;background:linear-gradient(135deg,var(--accent),#c084fc);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.sub{text-align:center;color:var(--dim);margin-bottom:24px}
.group{margin-bottom:16px}
.group label{display:block;margin-bottom:6px;font-weight:600;color:var(--dim)}
.group input,.group select{width:100%;padding:12px 14px;border-radius:10px;border:1px solid var(--border);background:var(--bg);color:var(--text);font-size:1rem;outline:none}
.group input:focus,.group select:focus{border-color:var(--accent)}
.subj-row{display:flex;gap:8px;flex-wrap:wrap}
.s-btn{padding:10px 16px;border-radius:10px;border:1px solid var(--border);background:var(--bg);color:var(--dim);cursor:pointer;font-size:0.95rem;transition:all .2s}
.s-btn:hover{border-color:var(--accent);color:var(--text)}
.s-btn.active{border-color:var(--accent);background:rgba(99,102,241,0.15);color:var(--accent)}
.start-btn{width:100%;padding:16px;border-radius:14px;border:none;background:linear-gradient(135deg,#6366f1,#8b5cf6);color:#fff;font-size:1.2rem;font-weight:700;cursor:pointer;margin-top:8px;transition:transform .15s,box-shadow .15s}
.start-btn:hover{transform:translateY(-2px);box-shadow:0 8px 25px rgba(99,102,241,0.4)}
.start-btn:active{transform:translateY(0)}
/* HUD */
.hud{display:flex;align-items:center;gap:16px;padding:10px 20px;background:var(--card);border-bottom:1px solid var(--border);font-size:0.85rem;flex-wrap:wrap;border-radius:12px 12px 0 0}
.hud-grade{background:rgba(99,102,241,0.15);color:var(--accent);padding:2px 10px;border-radius:20px;font-size:0.75rem}
.xp-bar-wrap{flex:1;min-width:100px;height:8px;background:var(--border);border-radius:4px;position:relative;overflow:hidden}
.xp-bar-fill{height:100%;background:linear-gradient(90deg,#f59e0b,var(--gold));border-radius:4px;transition:width .3s}
.xp-bar-text{position:absolute;top:-18px;right:0;font-size:0.7rem;color:var(--dim)}
.streak-badge{color:var(--gold);font-weight:700;animation:pulse .8s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.6}}
/* Map */
.map-header{text-align:center;padding:20px}
.map-header h2{font-size:1.4rem;margin-bottom:8px}
.map-stats{display:flex;gap:16px;justify-content:center;font-size:0.85rem;color:var(--dim)}
.map-tabs{display:flex;gap:8px;padding:0 20px 16px;flex-wrap:wrap;justify-content:center}
.mtb{padding:8px 16px;border-radius:20px;border:1px solid var(--border);background:var(--bg);color:var(--dim);cursor:pointer;font-size:0.85rem}
.mtb.active{border-color:var(--accent);background:rgba(99,102,241,0.15);color:var(--accent)}
.world-map{padding:0 16px 40px}
.stage-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:16px;margin-bottom:16px}
.stage-card.cur{border-color:rgba(99,102,241,0.4)}
.stage-card.locked{opacity:0.5}
.stage-title{font-weight:700;margin-bottom:12px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.stage-badge{font-size:0.75rem;padding:2px 8px;border-radius:12px}
.stage-badge.cur{background:rgba(99,102,241,0.2);color:var(--accent)}
.stage-badge.past{background:rgba(16,185,129,0.15);color:var(--green)}
.stage-badge.fut{background:rgba(100,116,139,0.15);color:var(--dim)}
.unit-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px}
.unit-card{background:rgba(15,15,35,0.8);border:1px solid var(--border);border-radius:10px;padding:14px;cursor:pointer;transition:all .2s}
.unit-card:hover{border-color:var(--accent);transform:translateY(-2px);box-shadow:0 4px 15px rgba(99,102,241,0.2)}
.unit-card.done{border-color:rgba(16,185,129,0.4);background:rgba(16,185,129,0.05)}
.unit-card.noq{opacity:0.5;cursor:default}
.unit-card.noq:hover{transform:none;box-shadow:none;border-color:var(--border)}
.unit-name{font-weight:600;margin-bottom:6px}
.unit-meta{font-size:0.8rem;color:var(--dim);display:flex;justify-content:space-between}
.unit-boss{font-size:0.75rem;color:var(--gold);margin-top:8px;padding:4px 8px;background:rgba(245,158,11,0.1);border-radius:6px}
/* Battle */
.battle-scene{display:flex;align-items:center;justify-content:center;gap:40px;padding:24px}
.enemy-hp-bar{width:120px;height:8px;background:var(--border);border-radius:4px;margin:6px auto;overflow:hidden}
.enemy-hp-fill{height:100%;background:linear-gradient(90deg,var(--red),#f87171);border-radius:4px;transition:width .3s}
.enemy-hp-text{font-size:0.75rem;color:#f87171;text-align:center}
.combo-text{font-size:1.2rem;font-weight:700;color:var(--gold);opacity:0;margin-top:8px}
.combo-text.show{opacity:1;animation:comboAnim .5s ease-out}
@keyframes comboAnim{0%{transform:scale(1.5)}100%{transform:scale(1)}}
.question-panel{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:20px;max-width:640px;margin:0 auto 16px}
.question-text{font-size:1.1rem;font-weight:600;margin-bottom:16px;line-height:1.6}
.options-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.opt-btn{padding:14px;border-radius:10px;border:2px solid var(--border);background:var(--bg);color:var(--text);cursor:pointer;font-size:0.95rem;text-align:left;transition:all .2s}
.opt-btn:hover{border-color:var(--accent);background:rgba(99,102,241,0.1)}
.opt-btn.correct{border-color:var(--green)!important;background:rgba(16,185,129,0.15)!important;color:var(--green)!important}
.opt-btn.wrong{border-color:var(--red)!important;background:rgba(239,68,68,0.15)!important;color:var(--red)!important}
.opt-btn.disabled{pointer-events:none;opacity:0.7}
.power-bar{display:flex;gap:8px;justify-content:center;padding:8px}
.pw-btn{padding:8px 14px;border-radius:20px;border:1px solid var(--border);background:var(--bg);color:var(--dim);cursor:pointer;font-size:0.8rem}
.pw-btn:hover:not(:disabled){border-color:var(--accent);color:var(--text)}
.pw-btn:disabled{opacity:0.4;cursor:default}
.back-btn{display:block;margin:0 auto 30px;padding:8px 24px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--dim);cursor:pointer;font-size:0.85rem}
.modal-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.7);z-index:100;display:none;align-items:center;justify-content:center}
.modal-card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:32px;max-width:420px;width:90%;text-align:center}
.result-icon{font-size:3rem;margin-bottom:12px}
.result-btn{width:100%;padding:14px;border-radius:12px;border:none;background:linear-gradient(135deg,#6366f1,#8b5cf6);color:#fff;font-size:1rem;font-weight:700;cursor:pointer;margin-top:12px}
.result-btn.sec{background:transparent;border:1px solid var(--border);color:var(--dim)}
.status-msg{padding:10px;margin:8px 0;border-radius:8px;font-size:0.85rem;text-align:center}
.status-msg.error{background:rgba(239,68,68,0.15);color:#f87171}
.status-msg.success{background:rgba(16,185,129,0.15);color:var(--green)}
.status-msg.info{background:rgba(99,102,241,0.15);color:var(--accent)}
@media(max-width:600px){.options-grid{grid-template-columns:1fr}.unit-grid{grid-template-columns:1fr}.battle-scene{flex-direction:column;gap:16px}}
</style>
</head>
<body>

<!-- 开始 -->
<div id="s-start" class="screen active">
  <div class="card">
    <h1>⚔️ 知识大冒险</h1>
    <p class="sub">打怪升级学知识 · 小学到中考全覆盖</p>
    <div id="startStatus"></div>
    <div class="group"><label>🎓 你的名字</label><input id="inName" value="冒险者"></div>
    <div class="group"><label>📐 当前年级</label><select id="inGrade"><option value="1">一年级</option><option value="2">二年级</option><option value="3">三年级</option><option value="4">四年级</option><option value="5">五年级</option><option value="6" selected>六年级</option><option value="7">七年级</option><option value="8">八年级</option><option value="9">九年级</option></select></div>
    <div class="group"><label>🗺️ 选择学科</label><div class="subj-row" id="subjPick"></div></div>
    <button class="start-btn" id="startBtn" onclick="doStart()">⚔️ 开始冒险！</button>
  </div>
</div>

<!-- 地图 -->
<div id="s-map" class="screen">
  <div class="hud">
    <span id="hPlayer">🎓 --</span><span class="hud-grade" id="hGrade">--</span>
    <span>⭐ Lv.<span id="hLevel">1</span></span>
    <div class="xp-bar-wrap"><div class="xp-bar-fill" id="hXpBar"></div><span class="xp-bar-text" id="hXpText">0/100</span></div>
    <span>🪙 <span id="hGold">0</span></span>
    <span class="streak-badge" id="hStreak" style="display:none">🔥 x0</span>
  </div>
  <div class="map-header">
    <h2 id="mapTitle">🗺️ 数学王国</h2>
    <div class="map-stats"><span>🏰 已掌握: <b id="mapM">0</b>/<b id="mapT">0</b></span><span>📊 <b id="mapP">0%</b></span></div>
  </div>
  <div class="map-tabs" id="mapTabs"></div>
  <div class="world-map" id="mapContent"></div>
  <button class="back-btn" onclick="showScreen('start')">← 返回</button>
</div>

<!-- 战斗 -->
<div id="s-battle" class="screen">
  <div class="hud">
    <span id="btName">🎓 --</span>
    <span class="streak-badge" id="btStr" style="display:none">🔥 x0</span>
    <span style="color:var(--dim)" id="btTime">⏱ 20s</span>
  </div>
  <div class="battle-scene">
    <div style="text-align:center">
      <div id="enSprite" style="font-size:4rem">👾</div>
      <div id="enName" style="font-weight:700;margin:6px 0">--</div>
      <div class="enemy-hp-bar"><div class="enemy-hp-fill" id="enHpBar"></div></div>
      <div class="enemy-hp-text" id="enHpText">HP: 3/3</div>
    </div>
    <div style="text-align:center"><div style="font-size:3rem">🧑‍🎓</div><div class="combo-text" id="comboText"></div></div>
  </div>
  <div class="question-panel">
    <div style="display:flex;gap:10px;margin-bottom:12px">
      <span style="font-size:0.75rem;background:rgba(99,102,241,0.2);color:var(--accent);padding:3px 10px;border-radius:20px" id="qTag">选择题</span>
      <span style="font-size:0.85rem" id="qDiff">⭐</span>
      <span style="margin-left:auto;font-size:0.8rem;color:var(--dim)" id="qNum">1/5</span>
    </div>
    <div class="question-text" id="qText">题目加载中...</div>
    <div class="options-grid" id="qOpts"></div>
  </div>
  <div class="power-bar">
    <button class="pw-btn" id="pwHint" onclick="usePower('hint')">💡 提示 <span>3</span></button>
    <button class="pw-btn" id="pwSkip" onclick="usePower('skip')">⏭️ 跳过 <span>2</span></button>
    <button class="pw-btn" id="pwFifty" onclick="usePower('fifty')">🎯 50/50 <span>1</span></button>
  </div>
  <button class="back-btn" onclick="doFlee()">🏃 逃跑</button>
</div>

<!-- 结果弹窗 -->
<div id="s-result" class="modal-overlay">
  <div class="modal-card">
    <div class="result-icon" id="rIcon">🎉</div>
    <h2 id="rTitle">战斗胜利！</h2><p id="rMsg"></p>
    <div id="rRewards" style="margin:12px 0;font-size:0.9rem"></div>
    <button class="result-btn" onclick="doContinue()">继续冒险 →</button>
    <button class="result-btn sec" onclick="showScreen('map')">返回地图</button>
  </div>
</div>

<script>
// ===== 全局状态 =====
let P = {name:'',grade_num:6,grade:'六年级',level:1,xp:0,xpToNext:100,gold:0,streak:0,maxStreak:0,correct:0,total:0,powers:{hint:3,skip:2,fifty:1}};
let curSubj = 'math';
let GDATA = null; // 游戏数据
let battle = null;

// ===== 学科列表 =====
const SUBJECTS = [
  {key:'chinese',icon:'📖',name:'语文'},
  {key:'math',icon:'🔢',name:'数学'},
  {key:'english',icon:'🌍',name:'英语'},
  {key:'physics',icon:'⚡',name:'物理'},
  {key:'chemistry',icon:'🧪',name:'化学'}
];

// ===== 初始化 =====
(function init(){
  const pick = document.getElementById('subjPick');
  SUBJECTS.forEach(s => {
    const btn = document.createElement('button');
    btn.className = 's-btn' + (s.key==='math'?' active':'');
    btn.textContent = s.icon + ' ' + s.name;
    btn.onclick = function(){document.querySelectorAll('.s-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');};
    pick.appendChild(btn);
  });
  
  // 加载数据
  loadGameData();
})();

function setStatus(msg,type){
  const el = document.getElementById('startStatus');
  el.innerHTML = msg ? '<div class="status-msg '+type+'">'+msg+'</div>' : '';
}

async function loadGameData(){
  try {
    setStatus('📡 正在加载题库...','info');
    const resp = await fetch('full_questions.json');
    if(!resp.ok) throw new Error('HTTP '+resp.status);
    GDATA = await resp.json();
    setStatus('✅ 题库加载成功！共加载 '+GDATA.subjects.math.total_points+' 个数学知识点','success');
    document.getElementById('startBtn').disabled = false;
  } catch(e){
    setStatus('⚠️ 加载题库失败: '+e.message+' - 将尝试内嵌数据','error');
    // fallback: 使用内嵌在HTML中的备用数据
    if(typeof FALLBACK_DATA !== 'undefined'){
      GDATA = FALLBACK_DATA;
      setStatus('✅ 使用备用题库','success');
    }
  }
  // 确保按钮可用
  document.getElementById('startBtn').disabled = false;
}

// ===== 屏幕切换 =====
function showScreen(name){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  const el = document.getElementById('s-'+name);
  if(!el){console.error('Screen not found: s-'+name);return;}
  el.classList.add('active');
  if(name==='map') renderMap();
}

// ===== 开始冒险 =====
function doStart(){
  if(!GDATA){
    setStatus('❌ 题库数据尚未加载，请稍等或刷新页面','error');
    return;
  }
  
  P.name = document.getElementById('inName').value.trim() || '冒险者';
  P.grade_num = parseInt(document.getElementById('inGrade').value) || 6;
  const grades = ['','一年级','二年级','三年级','四年级','五年级','六年级','七年级','八年级','九年级'];
  P.grade = grades[P.grade_num] || (P.grade_num+'年级');
  
  const activeBtn = document.querySelector('.s-btn.active');
  const btnText = activeBtn ? activeBtn.textContent : '数学';
  curSubj = btnText.includes('数学')?'math':btnText.includes('语文')?'chinese':btnText.includes('英语')?'english':btnText.includes('物理')?'physics':'chemistry';
  
  console.log('🚀 开始冒险:',P.name,'年级:',P.grade,'学科:',curSubj);
  
  // 重置进度
  P.level=1;P.xp=0;P.gold=0;P.streak=0;P.maxStreak=0;P.correct=0;P.total=0;
  
  updateHUD();
  showScreen('map');
}

// ===== HUD =====
function updateHUD(){
  document.getElementById('hPlayer').textContent = '🎓 '+P.name;
  document.getElementById('hGrade').textContent = '📐 '+P.grade;
  document.getElementById('hLevel').textContent = P.level;
  document.getElementById('hGold').textContent = P.gold;
  document.getElementById('hXpBar').style.width = Math.min(100,(P.xp/P.xpToNext)*100)+'%';
  document.getElementById('hXpText').textContent = P.xp+'/'+P.xpToNext+' XP';
  const s = document.getElementById('hStreak');
  if(P.streak>=2){s.style.display='inline';s.textContent='🔥 x'+P.streak;}else{s.style.display='none';}
  ['pwHint','pwSkip','pwFifty'].forEach(id=>{
    const key=id==='pwHint'?'hint':id==='pwSkip'?'skip':'fifty';
    const btn=document.getElementById(id);
    if(btn){btn.disabled=P.powers[key]<=0;btn.querySelector('span').textContent=P.powers[key];}
  });
}

// ===== 地图渲染 =====
function renderMap(){
  if(!GDATA){document.getElementById('mapContent').innerHTML='<p style="text-align:center;padding:40px;color:var(--dim)">⚠️ 题库数据未加载</p>';return;}
  
  const subj = GDATA.subjects[curSubj];
  if(!subj){document.getElementById('mapContent').innerHTML='<p style="text-align:center;padding:40px;color:var(--dim)">学科数据未找到: '+curSubj+'</p>';return;}
  
  document.getElementById('mapTitle').textContent = subj.icon+' '+subj.name+'王国';
  document.getElementById('mapM').textContent = subj.mastered_points || 0;
  document.getElementById('mapT').textContent = subj.total_points || 0;
  document.getElementById('mapP').textContent = Math.round(((subj.mastered_points||0)/(subj.total_points||1))*100)+'%';
  
  // 学科标签
  document.getElementById('mapTabs').innerHTML = SUBJECTS.map(s=>
    '<button class="mtb '+(s.key===curSubj?'active':'')+'" onclick="curSubj=\''+s.key+'\';renderMap()">'+s.icon+' '+s.name+'</button>'
  ).join('');
  
  let html = '';
  let totalUnits = 0;
  for(const stage of (subj.stages||[])){
    const gr = stage.grade_range||'';
    let sMin=99,sMax=0;
    if(gr.includes('-')){const p=gr.split('-');sMin=parseInt(p[0]);sMax=parseInt(p[1]);}
    else{sMin=sMax=parseInt(gr)||0;}
    
    const isCur = P.grade_num>=sMin && P.grade_num<=sMax;
    const isPast = P.grade_num>sMax;
    const isFut = P.grade_num<sMin;
    
    let cls='stage-card',badge='';
    if(isCur){cls+=' cur';badge='<span class="stage-badge cur">📍 当前学段</span>';}
    else if(isPast){badge='<span class="stage-badge past">✅ 已通过</span>';}
    else{cls+=' locked';badge='<span class="stage-badge fut">🔒 '+sMin+'年级起</span>';}
    
    html += '<div class="'+cls+'"><div class="stage-title">🏰 '+stage.name+' '+badge+'<span class="stage-badge" style="margin-left:auto">'+(stage.progress||0)+'%</span></div>';
    
    if(!isFut){
      html += '<div class="unit-grid">';
      for(const mod of (stage.modules||[])){
        for(const unit of (mod.units||[])){
          const pts = unit.points||[];
          const hasQ = pts.some(p=>(p.questions||[]).length>0);
          const mastered = pts.filter(p=>p.status==='mastered').length;
          const done = mastered===pts.length && pts.length>0;
          totalUnits++;
          const escapedName = unit.name.replace(/'/g,"\\'").replace(/"/g,'&quot;');
          html += '<div class="unit-card'+(done?' done':'')+(!hasQ?' noq':'')+'" '+
            (hasQ?'onclick="startBattle(\''+escapedName+'\')" ':'')+
            'title="'+(hasQ?'点击挑战':'暂无题目')+'">'+
            '<div class="unit-name">📜 '+unit.name+'</div>'+
            '<div class="unit-meta"><span>⭐ '+mastered+'/'+pts.length+'</span><span>'+(done?'已通关':hasQ?'⚔️ 挑战':'📝 无题')+'</span></div>'+
            (hasQ?'<div class="unit-boss">🐉 '+(unit.boss_name||unit.name+'守护者')+'</div>':'')+
            '</div>';
        }
      }
      html += '</div>';
    } else {
      html += '<div style="text-align:center;padding:20px;color:var(--dim)">🔒 升到'+sMin+'年级后解锁</div>';
    }
    html += '</div>';
  }
  
  document.getElementById('mapContent').innerHTML = html || '<p style="text-align:center;padding:40px;color:var(--dim)">地图生成中...</p>';
  console.log('🗺️ 地图渲染完成: '+curSubj+' 共'+totalUnits+'个单元');
}

// ===== 战斗系统 =====
function startBattle(unitName){
  if(!GDATA){alert('题库未加载');return;}
  const subj = GDATA.subjects[curSubj];
  let allPts = [];
  for(const stage of (subj.stages||[])){
    for(const mod of (stage.modules||[])){
      for(const unit of (mod.units||[])){
        if(unit.name===unitName) allPts = unit.points||[];
      }
    }
  }
  
  if(allPts.length===0){alert('该关卡暂无题目！');return;}
  
  console.log('⚔️ 开始战斗:',unitName,'知识点:',allPts.length,'总题数:',allPts.reduce((s,p)=>s+(p.questions||[]).length,0));
  
  // 重置所有知识点的题目索引
  allPts.forEach(p=>{p._qIdx=0;});
  
  battle = {
    unitName,
    points:allPts,
    ptIdx:0,
    enemyHP:allPts.reduce((s,p)=>s+(p.hp||(p.difficulty||1)*3),0),
    enemyMaxHP:allPts.reduce((s,p)=>s+(p.hp||(p.difficulty||1)*3),0),
    timer:null,
    timeLeft:0,
    answered:false
  };
  
  showScreen('battle');
  document.getElementById('btName').textContent = '🎓 '+P.name;
  nextQuestion();
}

function nextQuestion(){
  // 跳过已掌握的知识点
  while(battle.ptIdx < battle.points.length){
    const pt = battle.points[battle.ptIdx];
    if(pt.status==='mastered'){battle.ptIdx++;continue;}
    if(pt.questions && pt.questions.length>(pt._qIdx||0)) break;
    battle.ptIdx++;
  }
  
  if(battle.ptIdx >= battle.points.length){endBattle(true);return;}
  
  const pt = battle.points[battle.ptIdx];
  const qIdx = pt._qIdx||0;
  const q = pt.questions[qIdx];
  
  if(!q){endBattle(true);return;}
  
  // 敌人外观
  const diff = pt.difficulty||1;
  const sprites = ['👾','👻','🦇','🐲','👹'];
  document.getElementById('enSprite').textContent = sprites[Math.min(diff-1,4)]||'👾';
  document.getElementById('enName').textContent = pt.enemy_name||pt.name;
  document.getElementById('qTag').textContent = q.type==='choice'?'选择题':'问答题';
  document.getElementById('qDiff').textContent = '⭐'.repeat(diff);
  document.getElementById('qNum').textContent = (battle.ptIdx+1)+'/'+battle.points.length;
  document.getElementById('qText').textContent = q.question;
  
  const optDiv = document.getElementById('qOpts');
  if(q.type==='choice' && q.options && q.options.length>0){
    optDiv.innerHTML = q.options.map((o,i)=>
      '<button class="opt-btn" onclick="doAnswer(\''+String(o).replace(/'/g,"\\'")+'\',this)">'+String.fromCharCode(65+i)+'. '+o+'</button>'
    ).join('');
  } else {
    optDiv.innerHTML = '<input id="txtAns" style="grid-column:1/-1;padding:14px;border-radius:12px;border:2px solid var(--border);background:var(--bg);color:var(--text);font-size:1rem;outline:none" placeholder="输入答案..." onkeydown="if(event.key===\'Enter\')doAnswer(document.getElementById(\'txtAns\').value)">'+
      '<button class="opt-btn" onclick="doAnswer(document.getElementById(\'txtAns\').value)" style="grid-column:1/-1">✅ 提交</button>';
  }
  
  battle.answered = false;
  battle.timeLeft = q.time_limit||20;
  document.getElementById('btTime').textContent = '⏱ '+battle.timeLeft+'s';
  document.getElementById('btTime').style.color = 'var(--dim)';
  
  clearInterval(battle.timer);
  battle.timer = setInterval(()=>{
    battle.timeLeft--;
    document.getElementById('btTime').textContent = '⏱ '+battle.timeLeft+'s';
    if(battle.timeLeft<=5)document.getElementById('btTime').style.color='var(--red)';
    if(battle.timeLeft<=0){clearInterval(battle.timer);if(!battle.answered)doAnswer(null);}
  },1000);
  
  updateBattleDisplay();
}

function updateBattleDisplay(){
  if(!battle)return;
  const pct = Math.max(0,(battle.enemyHP/battle.enemyMaxHP)*100);
  document.getElementById('enHpBar').style.width = pct+'%';
  document.getElementById('enHpText').textContent = 'HP: '+Math.max(0,battle.enemyHP)+'/'+battle.enemyMaxHP;
  document.getElementById('btStr').style.display = P.streak>=2?'inline':'none';
  if(P.streak>=2)document.getElementById('btStr').textContent = '🔥 x'+P.streak;
}

function doAnswer(answer,btnEl){
  if(!battle || battle.answered)return;
  battle.answered = true;
  clearInterval(battle.timer);
  
  const pt = battle.points[battle.ptIdx];
  const qIdx = pt._qIdx||0;
  const q = pt.questions[qIdx];
  const correct = answer!==null && answer!=='' && String(answer).trim().toLowerCase()===String(q.answer).trim().toLowerCase();
  
  P.total++;
  
  if(correct){
    P.streak++;
    if(P.streak>P.maxStreak)P.maxStreak=P.streak;
    P.correct++;
    const diff = pt.difficulty||1;
    const xpGain = diff*10 + Math.min(P.streak-1,5)*5 + (battle.timeLeft>10?5:0);
    P.xp += xpGain;
    P.gold += diff*3 + Math.min(P.streak-1,5)*2;
    battle.enemyHP -= (pt.hp||diff*3);
    
    // 高亮正确答案
    document.querySelectorAll('.opt-btn').forEach(b=>{
      b.classList.add('disabled');
      if(b.textContent.trim().startsWith(q.answer)||b.textContent.includes(q.answer))b.classList.add('correct');
    });
    
    // 连击效果
    if(P.streak>=3){
      const el = document.getElementById('comboText');
      el.textContent = P.streak>=5?'🔥 '+P.streak+'连击！超神！':'🔥 '+P.streak+'连击！';
      el.classList.add('show');
      setTimeout(()=>el.classList.remove('show'),1500);
    }
    
    // 检查知识点是否掌握
    pt._qIdx = (pt._qIdx||0)+1;
    if(pt._qIdx >= (pt.questions||[]).length){
      pt.status = 'mastered';
      pt.accuracy = 100;
    }
    
    // 升级检查
    if(P.xp >= P.xpToNext){
      P.level++;
      P.xp -= P.xpToNext;
      P.xpToNext = Math.floor(P.xpToNext*1.5);
    }
  } else {
    P.streak = 0;
    // 减血 = 敌人攻击
    const dmg = Math.ceil((pt.hp||(pt.difficulty||1)*3)*0.3);
    // 玩家掉血（用enemyHP来反映剩余未掌握知识）
    document.querySelectorAll('.opt-btn').forEach(b=>b.classList.add('disabled'));
    if(btnEl)btnEl.classList.add('wrong');
    // 显示正确答案
    document.querySelectorAll('.opt-btn').forEach(b=>{
      if(b.textContent.trim().startsWith(q.answer)||b.textContent.includes(q.answer))b.classList.add('correct');
    });
    pt._qIdx = (pt._qIdx||0)+1;
    if(pt._qIdx >= (pt.questions||[]).length){
      pt._qIdx = 0; // 重置，允许重新挑战
    }
  }
  
  updateBattleDisplay();
  updateHUD();
  
  // 延迟进入下一题
  setTimeout(()=>{
    if(battle.enemyHP<=0){
      endBattle(true);
    } else {
      battle.ptIdx++;
      nextQuestion();
    }
  }, correct?800:1500);
}

function endBattle(won){
  clearInterval(battle.timer);
  
  const mastered = battle.points.filter(p=>p.status==='mastered').length;
  const total = battle.points.length;
  
  document.getElementById('rIcon').textContent = won?'🎉':'💪';
  document.getElementById('rTitle').textContent = won?'战斗胜利！':'继续加油！';
  document.getElementById('rMsg').textContent = battle.unitName+' - '+mastered+'/'+total+'个知识点已掌握';
  document.getElementById('rRewards').innerHTML = 
    '⭐ 经验: +'+(P.xp)+' | 🪙 金币: '+P.gold+' | 🔥 连胜: '+P.maxStreak;
  
  document.getElementById('s-result').style.display = 'flex';
  
  // 更新学科进度
  const subj = GDATA.subjects[curSubj];
  if(subj){
    let mast=0,tot=0;
    for(const stage of (subj.stages||[]))
      for(const mod of (stage.modules||[]))
        for(const unit of (mod.units||[]))
          for(const pt of (unit.points||[])){
            tot++;
            if(pt.status==='mastered')mast++;
          }
    subj.mastered_points = mast;
    subj.total_points = tot;
  }
}

function doContinue(){
  document.getElementById('s-result').style.display = 'none';
  showScreen('map');
}

function doFlee(){
  clearInterval(battle?.timer);
  battle = null;
  P.streak = 0;
  updateHUD();
  showScreen('map');
}

function usePower(type){
  if(!battle||battle.answered)return;
  if(P.powers[type]<=0)return;
  P.powers[type]--;
  
  if(type==='hint'){
    const pt = battle.points[battle.ptIdx];
    const q = pt.questions[pt._qIdx||0];
    alert('💡 提示: 答案是 "'+q.answer+'"');
  } else if(type==='skip'){
    battle.ptIdx++;
    nextQuestion();
  } else if(type==='fifty'){
    const pt = battle.points[battle.ptIdx];
    const q = pt.questions[pt._qIdx||0];
    const correctAns = q.answer;
    const wrongOpts = (q.options||[]).filter(o=>String(o).trim().toLowerCase()!==String(correctAns).trim().toLowerCase());
    const toRemove = wrongOpts.slice(0,Math.min(2,wrongOpts.length));
    document.querySelectorAll('.opt-btn').forEach(b=>{
      if(toRemove.some(o=>b.textContent.includes(o)))b.style.display='none';
    });
  }
  updateHUD();
}
</script>
